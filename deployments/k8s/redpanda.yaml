apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda
  labels:
    app: redpanda
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      containers:
      - name: redpanda
        image: docker.redpanda.com/redpandadata/redpanda:latest
        args:
        - redpanda
        - start
        - --smp
        - "1"
        - --reserve-memory
        - 0M
        - --overprovisioned
        - --node-id
        - "0"
        - --kafka-addr
        - "PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:9093"
        - --advertise-kafka-addr
        - "PLAINTEXT://redpanda:9092,OUTSIDE://localhost:9093"
        ports:
        - containerPort: 9092
          name: kafka
        - containerPort: 9093
          name: kafka-outside
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda
spec:
  selector:
    app: redpanda
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
    - name: kafka-outside
      port: 9093
      targetPort: 9093
