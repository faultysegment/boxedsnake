apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  labels:
    app: scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      containers:
      - name: scheduler
        image: boxedsnake-scheduler:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8081
        env:
        - name: KAFKA_BROKERS
          value: redpanda:9092
        - name: DATABASE_URL
          value: postgres://boxedsnake:boxedsnake@postgres:5432/scheduler?sslmode=disable
---
apiVersion: v1
kind: Service
metadata:
  name: scheduler
spec:
  selector:
    app: scheduler
  ports:
  - port: 8081
    targetPort: 8081
