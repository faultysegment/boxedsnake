apiVersion: apps/v1
kind: Deployment
metadata:
  name: history
spec:
  replicas: 1
  selector:
    matchLabels:
      app: history
  template:
    metadata:
      labels:
        app: history
    spec:
      containers:
        - name: history
          image: boxedsnake-history:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8082
          env:
            - name: DATABASE_URL
              value: "postgres://boxedsnake:boxedsnake@postgres:5432/scheduler?sslmode=disable"
            - name: KAFKA_BROKERS
              value: "redpanda:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: history
spec:
  selector:
    app: history
  ports:
    - protocol: TCP
      port: 8082
      targetPort: 8082
